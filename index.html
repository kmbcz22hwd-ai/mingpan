<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命盤解析系統 AI版</title>

<style>
body{
  margin:0;
  font-family:"Noto Serif TC", serif;
  background:#0f0f1a;
  color:#fff;
}

.nav{
  display:flex;
  flex-wrap:wrap;
  background:#1c1c2e;
  padding:10px;
}

.nav button{
  margin:4px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#333;
  color:#fff;
}

.nav button.on{
  background:#ffcc00;
  color:#000;
}

.page{
  display:none;
  padding:20px;
}

.page.on{
  display:block;
}

input, textarea{
  width:100%;
  padding:8px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}

.card{
  background:#1c1c2e;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- 導覽列 -->
<div class="nav" id="nav"></div>

<!-- 17頁內容 -->
<div id="pages"></div>

<script>
// ======================
// 基本設定
// ======================
const pageCount = 17;
const pages = document.getElementById("pages");
const nav = document.getElementById("nav");

// ======================
// 建立 17 頁
// ======================
for(let i=1;i<=pageCount;i++){
  // nav button
  let btn = document.createElement("button");
  btn.innerText = "第" + i + "宮";
  btn.onclick = (e)=>goPage("p"+i,e.target);
  if(i===1) btn.classList.add("on");
  nav.appendChild(btn);

  // page
  let div = document.createElement("div");
  div.className = "page" + (i===1 ? " on":"");
  div.id = "p"+i;

  div.innerHTML = `
    <h2>第 ${i} 宮</h2>

    <div class="card">
      <input placeholder="輸入此宮主題內容" id="input_${i}">
      <button onclick="saveData(${i})">保存資料</button>
    </div>

    <div class="card">
      <h3>AI 命盤解讀</h3>
      <button onclick="aiRead(${i})">生成解讀</button>
      <div id="ai_${i}">尚未生成</div>
    </div>
  `;

  pages.appendChild(div);
}

// ======================
// 頁面切換
// ======================
function goPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));

  document.getElementById(id).classList.add('on');
  el.classList.add('on');
}

// ======================
// 保存資料（永久）
// ======================
function saveData(i){
  const val = document.getElementById("input_"+i).value;
  localStorage.setItem("mingpan_"+i, val);
  alert("已保存第 "+i+" 宮資料");
}

// ======================
// 載入資料
// ======================
function loadData(){
  for(let i=1;i<=pageCount;i++){
    let val = localStorage.getItem("mingpan_"+i);
    if(val){
      let input = document.getElementById("input_"+i);
      if(input) input.value = val;
    }
  }
}

// ======================
// AI 解讀（先做本地版）
// ======================
function aiRead(i){
  let val = document.getElementById("input_"+i).value;

  let result = "";

  if(!val){
    result = "請先輸入內容再生成解讀。";
  }else{
    result =
    "🔮 AI 命盤分析：\n\n" +
    "根據此宮輸入內容：「" + val + "」\n\n" +
    "解讀方向：\n" +
    "1. 此宮能量正在變動\n" +
    "2. 建議注意人際與決策\n" +
    "3. 若持續加強，可提升運勢流動\n\n" +
    "（此為本地AI模型，之後可升級API版）";
  }

  document.getElementById("ai_"+i).innerText = result;
}

// ======================
// 初始化
// ======================
loadData();
</script>

</body>
</html>
