<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數字命盤分析系統</title>

<style>
body{
    font-family: sans-serif;
    background:#0f172a;
    color:#e2e8f0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:#1e293b;
    padding:30px;
    border-radius:16px;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

h1{
    font-size:20px;
    margin-bottom:20px;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:10px;
    background:#38bdf8;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#0ea5e9;
}

.result{
    margin-top:15px;
    line-height:1.6;
    font-size:14px;
    background:#0b1220;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>數字命盤分析</h1>

    <input type="date" id="birth">
    <button onclick="calc()">開始解析</button>

    <div class="result" id="result">請輸入生日</div>
</div>

<script>
function reduceNumber(num){
    while(num > 9 && num !== 11 && num !== 22){
        num = num.toString()
            .split('')
            .reduce((a,b)=>Number(a)+Number(b));
    }
    return num;
}

function calc(){
    const birthEl = document.getElementById("birth");
    const resultEl = document.getElementById("result");

    if(!birthEl || !resultEl){
        alert("頁面元素錯誤");
        return;
    }

    let birth = birthEl.value;

    if(!birth){
        resultEl.innerHTML = "請先輸入生日";
        return;
    }

    // 修正 replaceAll 相容性問題
    let clean = birth.split("-").join("");

    let nums = clean.split("").map(Number);
    let sum = nums.reduce((a,b)=>a+b,0);

    let lifePath = reduceNumber(sum);

    let meaning = "";

    switch(lifePath){
        case 1:
            meaning = "領導型｜獨立、果斷";
            break;
        case 2:
            meaning = "協調型｜溫和、敏感";
            break;
        case 3:
            meaning = "表達型｜創意、人緣佳";
            break;
        case 4:
            meaning = "穩定型｜務實、耐壓";
            break;
        case 5:
            meaning = "自由型｜喜變化、不受限";
            break;
        case 6:
            meaning = "責任型｜重感情、照顧他人";
            break;
        case 7:
            meaning = "思考型｜理性、內省";
            break;
        case 8:
            meaning = "權力型｜企圖心強";
            break;
        case 9:
            meaning = "智慧型｜理想高、包容";
            break;
        case 11:
            meaning = "靈性大師數｜直覺強、敏感";
            break;
        case 22:
            meaning = "建構大師數｜格局大、壓力高";
            break;
    }

    resultEl.innerHTML =
        `你的生命靈數：<b>${lifePath}</b><br><br>${meaning}`;
}
</script>

</body>
</html>
