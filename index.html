<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>靈數命盤｜完整解析系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
:root{
  --ink:#12100a;--bg:#f5f0e6;--gold:#b8923a;--gold-lt:#e8d5a0;--gold-pale:#faf6eb;
  --jade:#2a5e50;--jade-lt:#e4f0ec;--rust:#7d3520;--mist:#6b7280;--border:#d6c99a;--card:#fffdf6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
/* HEADER */
.header{background:var(--ink);padding:18px 20px;display:flex;align-items:center;gap:12px;}
.logo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;width:36px;height:36px;padding:4px;border:1.5px solid var(--gold);}
.logo-grid span{background:var(--gold);opacity:.5;}
.logo-grid span:nth-child(5){opacity:1;}
.header h1{font-family:'Noto Serif TC',serif;color:var(--gold);font-size:1.1rem;letter-spacing:.1em;}
.header p{color:rgba(255,255,255,.4);font-size:.7rem;margin-top:2px;letter-spacing:.06em;}
/* NAV */
.nav{background:var(--ink);display:flex;border-top:1px solid rgba(255,255,255,.08);overflow-x:auto;}
.nav a{color:rgba(255,255,255,.45);padding:10px 14px;font-size:.78rem;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;text-decoration:none;transition:all .2s;}
.nav a.on{color:var(--gold);border-bottom-color:var(--gold);}
/* VIEWS */
.view{display:none;}.view.on{display:block;}
.wrap{max-width:680px;margin:0 auto;padding:24px 16px 80px;}
/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:22px 20px;margin-bottom:14px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--jade));}
.card-title{font-family:'Noto Serif TC',serif;font-size:.9rem;font-weight:700;color:var(--ink);margin-bottom:16px;letter-spacing:.06em;}
/* FORM */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.row1{margin-bottom:10px;}
.field label{display:block;font-size:.72rem;color:var(--mist);letter-spacing:.06em;margin-bottom:4px;}
.field select,.field input{width:100%;border:1px solid var(--border);background:var(--bg);padding:9px 10px;font-family:'Noto Sans TC',sans-serif;font-size:.88rem;color:var(--ink);border-radius:4px;outline:none;}
.field select:focus,.field input:focus{border-color:var(--gold);}
.btn{display:block;width:100%;padding:13px;background:var(--ink);color:var(--gold);border:none;border-radius:4px;font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;letter-spacing:.1em;cursor:pointer;margin-top:8px;}
.btn:hover{background:#2d2010;}
/* PAGES */
.pages{display:none;}.pages.on{display:block;}
.page-nav{display:flex;overflow-x:auto;gap:0;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px;}
.pnav-btn{flex-shrink:0;padding:7px 12px;border:none;background:transparent;border-radius:4px;font-size:.75rem;cursor:pointer;color:var(--mist);font-family:'Noto Sans TC',sans-serif;white-space:nowrap;}
.pnav-btn.on{background:var(--ink);color:var(--gold);font-weight:700;}
.page{display:none;}.page.on{display:block;}
/* SECTION */
.sec{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:12px;}
.sec-head{font-family:'Noto Serif TC',serif;font-size:.9rem;font-weight:700;color:var(--jade);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-icon{width:22px;height:22px;background:var(--jade);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;flex-shrink:0;}
.sec-body{font-size:.86rem;line-height:1.95;color:#2a200e;}
.sec-body p{margin-bottom:8px;}
/* PALACE */
.palace{display:grid;grid-template-columns:repeat(3,80px);grid-template-rows:repeat(3,80px);gap:2px;background:var(--border);border:2px solid var(--border);border-radius:4px;overflow:hidden;}
.pc{background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
.pc .pnum{position:absolute;top:4px;left:6px;font-size:.55rem;color:var(--border);}
.pc .pval{font-family:'Noto Serif TC',serif;font-size:1.6rem;font-weight:900;color:var(--gold);line-height:1;}
.pc.empty .pval{color:var(--border);font-weight:300;font-size:1.3rem;}
.pc.multi .pval{color:var(--jade);}
.pc.miss{background:#fdf6f4;}
.pc.miss .pval{color:#e8c4b8;}
/* CHIPS */
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0;}
.chip{padding:4px 10px;border-radius:3px;font-size:.8rem;font-weight:700;font-family:'Noto Serif TC',serif;border:1px solid;}
.chip.g{background:var(--gold-pale);color:#8a6820;border-color:var(--gold-lt);}
.chip.j{background:var(--jade-lt);color:var(--jade);border-color:#a0ccc4;}
.chip.r{background:#fff0ee;color:var(--rust);border-color:#f0c8c0;}
/* BIG NUM */
.bnum{font-family:'Noto Serif TC',serif;font-size:4rem;font-weight:900;color:var(--gold);line-height:1;}
.bnum-row{display:flex;gap:24px;flex-wrap:wrap;margin:12px 0;}
.bnum-item .bl{font-size:.7rem;color:var(--mist);letter-spacing:.06em;margin-bottom:4px;}
.bnum-item .bv{font-family:'Noto Serif TC',serif;font-size:2.2rem;font-weight:900;color:var(--gold);line-height:1;}
.bnum-item.j .bv{color:var(--jade);}
.bnum-item.r .bv{color:var(--rust);}
/* STAR */
.stars{color:var(--gold);letter-spacing:2px;font-size:1rem;}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:8px;}
.tbl th{background:var(--ink);color:var(--gold);padding:8px 10px;text-align:left;font-size:.76rem;letter-spacing:.04em;}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.6;}
.tbl tr:nth-child(even) td{background:var(--gold-pale);}
.tbl .mn{font-family:'Noto Serif TC',serif;font-weight:700;color:var(--gold);}
.tbl .mf{font-family:'Noto Serif TC',serif;font-weight:700;color:var(--jade);}
/* CONN */
.conn{background:var(--gold-pale);border:1px solid var(--gold-lt);border-radius:4px;padding:14px 16px;margin-bottom:10px;}
.conn-t{font-family:'Noto Serif TC',serif;font-size:.9rem;font-weight:700;color:var(--gold);margin-bottom:6px;}
.conn-d{font-size:.83rem;line-height:1.85;color:#3d2d10;}
/* EXPORT */
.export-bar{background:var(--ink);border-radius:6px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.export-bar p{color:rgba(255,255,255,.6);font-size:.82rem;}
.ebtn{background:var(--gold);color:var(--ink);border:none;padding:9px 18px;border-radius:4px;font-size:.82rem;font-weight:700;cursor:pointer;}
/* CRM */
.crm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.crm-header h2{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;}
.crm-add{background:var(--jade);color:#fff;border:none;padding:8px 16px;border-radius:4px;font-size:.82rem;cursor:pointer;}
.client-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;}
.cc-info h3{font-size:.92rem;font-weight:700;margin-bottom:4px;}
.cc-info p{font-size:.78rem;color:var(--mist);line-height:1.6;}
.cc-btns{display:flex;gap:6px;flex-shrink:0;}
.cc-btn{padding:6px 12px;border:1px solid var(--border);border-radius:3px;font-size:.75rem;cursor:pointer;background:var(--bg);}
.cc-btn.primary{background:var(--jade);color:#fff;border-color:var(--jade);}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:#fff;border-radius:8px;padding:24px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h2{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.modal-btn{padding:9px 20px;border-radius:4px;border:none;cursor:pointer;font-size:.85rem;font-weight:700;}
.modal-btn.save{background:var(--jade);color:#fff;}
.modal-btn.cancel{background:var(--bg);border:1px solid var(--border);}
/* LOADING */
#loading{display:none;text-align:center;padding:48px 0;}
#loading.on{display:block;}
.spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
/* PRINT */
@media print{
  .header,.nav,.export-bar,.page-nav,#loading{display:none!important;}
  .pages.on,.page.on{display:block!important;}
  .page{display:block!important;}
  body{background:#fff;}
}
@media(max-width:480px){
  .row2,.row3{grid-template-columns:1fr;}
  .palace{grid-template-columns:repeat(3,72px);grid-template-rows:repeat(3,72px);}
}
</style>
</head>

// ══════════════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════════════
function goNav(id, el) {
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('on'); });
  document.querySelectorAll('.nav a').forEach(function(a){ a.classList.remove('on'); });
  document.getElementById(id).classList.add('on');
  el.classList.add('on');
  if(id==='crm') renderClients();
}

// ══════════════════════════════════════════════════════
// NUMEROLOGY CORE
// ══════════════════════════════════════════════════════
function r9(n){ while(n>9){ n=String(n).split('').reduce(function(a,b){return a+parseInt(b);},0); } return n; }

function lifePath(y,m,d){
  var s=0;
  String(y).split('').forEach(function(c){s+=parseInt(c);});
  String(m).padStart(2,'0').split('').forEach(function(c){s+=parseInt(c);});
  String(d).padStart(2,'0').split('').forEach(function(c){s+=parseInt(c);});
  return r9(s);
}
function palaceCounts(y,m,d){
  var digits=[];
  String(y).split('').forEach(function(c){digits.push(parseInt(c));});
  String(m).padStart(2,'0').split('').forEach(function(c){digits.push(parseInt(c));});
  String(d).padStart(2,'0').split('').forEach(function(c){digits.push(parseInt(c));});
  var c={};for(var i=1;i<=9;i++) c[i]=0;
  digits.forEach(function(x){if(x>0) c[x]++;});
  return c;
}
function getConns(counts){
  var p={};for(var k in counts){if(counts[k]>0)p[k]=true;}
  return ["147","258","369","456","789","123","159","168","357"].filter(function(l){
    return l.split('').every(function(n){return p[n];});
  });
}
function getMiss(counts){ return Object.keys(counts).filter(function(k){return counts[k]===0;}).map(Number); }
function yearFlow(y,m,d,ty){
  var lp=lifePath(y,m,d);
  var ys=0; String(ty).split('').forEach(function(c){ys+=parseInt(c);});
  return r9(lp+ys);
}
function monthFlow(yf,mo){ return r9(yf+mo); }

// Zodiac & Constellation
function zodiac(y){
  var z=['鼠','牛','虎','兔','龍','蛇','馬','羊','猴','雞','狗','豬'];
  return z[(y-4)%12]+'年';
}
function constellation(m,d){
  var c=[
    [1,20,'摩羯'],[2,19,'水瓶'],[3,20,'雙魚'],[4,20,'牡羊'],[5,21,'金牛'],[6,21,'雙子'],
    [7,23,'巨蟹'],[8,23,'獅子'],[9,23,'處女'],[10,23,'天秤'],[11,22,'天蠍'],[12,22,'射手'],[1,19,'摩羯']
  ];
  for(var i=0;i<c.length-1;i++){
    var nm=c[i][0],nd=c[i][1],nn=c[i][2];
    var xm=c[i+1][0],xd=c[i+1][1];
    if((m===nm&&d>=nd)||(m===xm&&d<xd)) return nn+'座';
  }
  return '摩羯座';
}

// ══════════════════════════════════════════════════════

function buildPages(){
  // Nav
  var nav=document.getElementById('page-nav');
  nav.innerHTML='';
  PAGE_DEFS.forEach(function(p,i){
    var b=document.createElement('button');
    b.className='pnav-btn'+(i===0?' on':'');
    b.textContent=p.label;
    b.setAttribute('onclick','goPage("'+p.id+'",this)');
    nav.appendChild(b);
  });

  var con=document.getElementById('pages-container');
  con.innerHTML='';
  PAGE_DEFS.forEach(function(p,i){
    var div=document.createElement('div');
    div.id=p.id;
    div.className='page'+(i===0?' on':'');
    div.innerHTML=genPage(p.id);
    con.appendChild(div);
  });
}

function goPage(id,el){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.pnav-btn').forEach(function(b){b.classList.remove('on');});
  document.getElementById(id).classList.add('on');
  el.classList.add('on');
}

function genPalace(counts,miss){
  var ORDER=[7,8,9,4,5,6,1,2,3];
  var missSet={};miss.forEach(function(n){missSet[n]=true;});
  var html='<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;">';
  html+='<div class="palace">';
  ORDER.forEach(function(pos){
    var cnt=counts[pos];
    var cls='pc';
    if(cnt===0) cls+=' miss';
    else if(cnt>=2) cls+=' multi';
    html+='<div class="'+cls+'"><span class="pnum">'+pos+'</span><span class="pval">'+(cnt===0?'○':String(pos).repeat(Math.min(cnt,4)))+'</span></div>';
  });
  html+='</div>';
  html+='<div style="flex:1;min-width:150px;">';
  html+='<div style="font-size:.78rem;color:var(--mist);line-height:2;margin-bottom:8px;"><span style="color:var(--gold)">●</span> 金色＝出現<br><span style="color:var(--jade)">●</span> 綠色＝重複<br><span style="color:#e8c4b8">●</span> 淡粉＝缺數</div>';
  if(miss.length){
    html+='<div style="margin-bottom:6px;font-size:.78rem;font-weight:700;color:var(--rust);">缺數：</div>';
    html+='<div class="chip-row">';
    miss.forEach(function(n){html+='<span class="chip r">缺'+n+'</span>';});
    html+='</div>';
  } else {
    html+='<p style="font-size:.8rem;color:var(--jade);">✦ 1～9 全數具備</p>';
  }
  var multi=Object.keys(counts).filter(function(k){return counts[k]>=2;});
  if(multi.length){
    html+='<div style="margin-top:8px;font-size:.78rem;font-weight:700;color:var(--jade);">強化數：</div>';
    html+='<div class="chip-row">';
    multi.forEach(function(k){html+='<span class="chip j">'+k+'×'+counts[k]+'</span>';});
    html+='</div>';
  }
  html+='</div></div>';
  return html;
}

// COPY
// ══════════════════════════════════════════════════════
function buildCopy(){
  var g=G;
  var t='靈數命盤完整報告\n';
  t+='姓名：'+g.name+'　生日：'+g.y+'/'+g.m+'/'+g.d+'　'+g.status+'\n';
  t+='生命靈數：'+g.lp+'（'+NUM[g.lp].label+'）　流年'+g.ty+'：'+g.yf+'（'+YEAR[g.yf].t+'）\n';
  t+='缺數：'+(g.miss.length?g.miss.join('、'):'無')+'　連線：'+(g.conns.length?g.conns.join('、'):'無')+'\n\n';
  t+='◆ 性格\n'+NUM[g.lp].good+'\n\n';
  t+='◆ 財運\n靠'+NUM[g.lp].job.split('、')[0]+'方向發展，流年'+g.yf+'（'+YEAR[g.yf].t+'）：'+YEAR[g.yf].d+'\n\n';
  t+='◆ '+g.ty+'流月\n';
  for(var mo=1;mo<=12;mo++){
    var mf=monthFlow(g.yf,mo);
    t+=mo+'月 流月'+mf+'（'+NUM[mf].label+'）：'+MONTH_TIPS[mo-1]+'\n';
  }
  t+='\n◆ 建議\n'+YEAR[g.yf].d;
  document.getElementById('copy-buf').textContent=t;
}
function copyReport(){
  var t=document.getElementById('copy-buf').textContent;
  if(!t.trim()){alert('請先解析命盤');return;}
  navigator.clipboard.writeText(t).then(function(){alert('✅ 已複製，可直接貼給客人！');});
}

// ══════════════════════════════════════════════════════
// CRM
// ══════════════════════════════════════════════════════
var clients=JSON.parse(localStorage.getItem('mp_clients')||'[]');
var editIdx=-1;

function renderClients(){
  var el=document.getElementById('client-list');
  if(!clients.length){
    el.innerHTML='<div style="text-align:center;padding:40px;color:var(--mist);font-size:.88rem;">尚未新增任何客戶</div>';
    return;
  }
  el.innerHTML='';
  clients.forEach(function(c,i){
    var lp='';
    if(c.year&&c.month&&c.day) lp='靈數'+lifePath(+c.year,+c.month,+c.day);
    var div=document.createElement('div');
    div.className='client-card';
    div.innerHTML='<div class="cc-info"><h3>'+c.name+'</h3><p>'+c.phone+(lp?' ｜ '+lp:'')+(c.note?' ｜ '+c.note:'')+'</p></div>'+
      '<div class="cc-btns">'+
      '<button class="cc-btn primary" onclick="loadClient('+i+')">解析</button>'+
      '<button class="cc-btn" onclick="editClient('+i+')">編輯</button>'+
      '<button class="cc-btn" onclick="delClient('+i+')">刪除</button>'+
      '</div>';
    el.appendChild(div);
  });
}

function openAddClient(){
  editIdx=-1;
  document.getElementById('modal-title').textContent='新增客戶';
  ['c-name','c-phone','c-year','c-month','c-day','c-note'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('client-modal').classList.add('on');
}
function editClient(i){
  editIdx=i;
  var c=clients[i];
  document.getElementById('modal-title').textContent='編輯客戶';
  document.getElementById('c-name').value=c.name||'';
  document.getElementById('c-phone').value=c.phone||'';
  document.getElementById('c-year').value=c.year||'';
  document.getElementById('c-month').value=c.month||'';
  document.getElementById('c-day').value=c.day||'';
  document.getElementById('c-note').value=c.note||'';
  document.getElementById('client-modal').classList.add('on');
}
function closeModal(){ document.getElementById('client-modal').classList.remove('on'); }
function saveClient(){
  var c={
    name:document.getElementById('c-name').value.trim(),
    phone:document.getElementById('c-phone').value.trim(),
    year:document.getElementById('c-year').value.trim(),
    month:document.getElementById('c-month').value.trim(),
    day:document.getElementById('c-day').value.trim(),
    note:document.getElementById('c-note').value.trim()
  };
  if(!c.name){alert('請輸入姓名');return;}
  if(editIdx>=0) clients[editIdx]=c;
  else clients.push(c);
  localStorage.setItem('mp_clients',JSON.stringify(clients));
  closeModal();
  renderClients();
}
function delClient(i){
  if(!confirm('確定刪除「'+clients[i].name+'」？')) return;
  clients.splice(i,1);
  localStorage.setItem('mp_clients',JSON.stringify(clients));
  renderClients();
}
function loadClient(i){
  var c=clients[i];
  document.getElementById('f-name').value=c.name||'';
  if(c.year) document.getElementById('f-year').value=c.year;
  if(c.month) document.getElementById('f-month').value=c.month;
  if(c.day) document.getElementById('f-day').value=c.day;
  goNav('analyze',document.querySelector('.nav a'));
  document.querySelector('.nav a').classList.add('on');
  document.querySelectorAll('.nav a')[1].classList.remove('on');
  window.scrollTo(0,0);
}
</script>
